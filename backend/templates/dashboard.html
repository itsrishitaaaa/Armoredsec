<!DOCTYPE html>
<html>

<head>
<title>ARMOR(E)DSEC Security Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111827;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

.header h1{
margin:0;
font-size:26px;
}

/* BUTTONS */

.buttons button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:10px;
font-weight:bold;
}

.scan{
background:#22c55e;
color:white;
}

.logout{
background:#ef4444;
color:white;
}

button:hover{
opacity:0.85;
}

/* MAIN CONTAINER */

.container{
width:1200px;
margin:auto;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1f2937;
padding:22px;
border-radius:12px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.35);
transition:transform 0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card h2{
margin:0;
font-size:30px;
}

.card p{
margin:6px 0 0;
color:#9ca3af;
}

/* CHART */

.chart-box{
width:340px;
margin:20px auto;
background:#1f2937;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

/* TABLE */

.table-box{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-top:40px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
padding:12px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #374151;
}

tr:hover{
background:#111827;
}

/* SEVERITY BADGES */

.badge{
padding:4px 10px;
border-radius:6px;
font-size:13px;
font-weight:bold;
}

.high{background:#dc2626;}
.medium{background:#f59e0b;}
.low{background:#16a34a;}
.critical{background:#7f1d1d;}

.fix-btn{
background:#22c55e;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>


<body>

<div class="header">

<h1>🛡 ARMOR(E)DSEC Security Dashboard</h1>

<div class="buttons">
<button class="scan" onclick="runScan()">Run Security Scan</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

</div>


<div class="container">

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total Alerts</p>
</div>

<div class="card">
<h2 id="high">0</h2>
<p>High Alerts</p>
</div>

<div class="card">
<h2 id="medium">0</h2>
<p>Medium Alerts</p>
</div>

<div class="card">
<h2 id="risk">LOW</h2>
<p>Risk Level</p>
</div>

<div class="card">
<h2 id="riskScore">0</h2>
<p>Cloud Risk Score</p>
</div>

</div>


<div class="chart-box">
<canvas id="chart"></canvas>
</div>


<div class="table-box">

<table>

<thead>
<tr>
<th>ID</th>
<th>Issue</th>
<th>Severity</th>
<th>Solution</th>
<th>Timestamp</th>
<th>Action</th>
</tr>
</thead>

<tbody id="alerts"></tbody>

</table>

</div>

</div>



<script>

let chartInstance=null;

function runScan(){

fetch("/scan",{credentials:"include"})
.then(r=>r.json())
.then(d=>{
alert(d.message)
loadAlerts()
})

}


function fixBucket(bucketName){

fetch("/fix_s3",{
method:"POST",
credentials:"include",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
bucket:bucketName
})
})
.then(r=>r.json())
.then(d=>{
alert(d.message)
loadAlerts()
})

}


function loadAlerts(){

fetch("/alerts",{credentials:"include"})
.then(r=>r.json())
.then(d=>{

document.getElementById("total").innerText=d.total
document.getElementById("high").innerText=d.high
document.getElementById("medium").innerText=d.medium
document.getElementById("risk").innerText=d.risk
document.getElementById("riskScore").innerText=d.risk_score

/* Risk score color */

if(d.risk_score < 50){
document.getElementById("riskScore").style.color="#ef4444"
}
else if(d.risk_score < 80){
document.getElementById("riskScore").style.color="#f59e0b"
}
else{
document.getElementById("riskScore").style.color="#22c55e"
}

/* TABLE */

let rows=""

d.alerts.forEach(a=>{

let action=""

if(a[2].includes("Public S3 Bucket")){
let bucketName=a[2].split(": ")[1]
action=`<button class="fix-btn" onclick="fixBucket('${bucketName}')">Fix Issue</button>`
}

rows+=`
<tr>
<td>${a[0]}</td>
<td>${a[2]}</td>
<td><span class="badge ${a[3].toLowerCase()}">${a[3]}</span></td>
<td>${a[4]}</td>
<td>${a[5]}</td>
<td>${action}</td>
</tr>
`

})

document.getElementById("alerts").innerHTML=rows


/* CHART */

if(chartInstance) chartInstance.destroy()

chartInstance=new Chart(document.getElementById("chart"),{

type:"doughnut",

data:{
labels:["High","Medium"],
datasets:[{
data:[d.high,d.medium],
backgroundColor:["#ef4444","#f59e0b"]
}]
},

options:{
plugins:{
legend:{labels:{color:"white"}}
}
}

})

})

}


function logout(){

fetch("/logout",{credentials:"include"})
.then(r=>r.json())
.then(d=>{
alert(d.message)
location.href="/loginpage"
})

}

loadAlerts()

</script>

</body>
</html>
